<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>诚由上阳的个人主页</title>
	<style>
		body {
			background-color: #0f172a;
			text-align: center;
			font-family: sans-serif;
			overflow: hidden;
			margin: 0;
			padding: 0;
			position: relative;
		}

		/* --- 新增：代码雨 Canvas 样式 --- */
		#matrix {
			position: fixed;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: -1;
			/* 放在最底层 */
			opacity: 0.8;
			/* 稍微透明一点，让文字更清晰 */
		}

		h1 {
			color: #38bdf8;
			text-shadow: 0 0 20px #38bdf8;
			position: relative;
			/* 确保内容在背景之上 */
		}

		h2 {
			color: #ff007c;
			text-shadow: 0 0 10px #ff007c;
			position: relative;
		}

		img {
			border-radius: 50%;
			border: 4px solid white;
			width: 300px;
			height: 300px;
			object-fit: cover;
			box-shadow: 0 0 30px #38bdf8;
			cursor: pointer;
			position: relative;
			z-index: 10;
		}

		a {
			text-decoration: none;
			position: relative;
			z-index: 10;
		}

		@keyframes leftRightMove {
			0% {
				transform: translateX(20px);
			}

			100% {
				transform: translateX(-20px);
			}
		}

		a h1 {
			animation: leftRightMove 1.5s ease-in-out infinite alternate;
			color: #00ff00;
			text-shadow: 0 0 20px #00ff00;
		}

		.fake-alert {
			background-color: rgb(22, 21, 21);
			color: red;
			position: fixed;
			left: 50%;
			top: 50%;
			border: 2px solid red;
			box-shadow: 0 0 25px #ff3333;
			padding: 10px;
			font-weight: bold;
			border-radius: 5px;
			transform: scale(0.1);
			opacity: 0;
			transition: all 0.5s;
			z-index: 100;
			pointer-events: none;
			/* 让鼠标可以穿透警告框 */
		}
	</style>
</head>

<body>

	<!-- 新增：代码雨画布 -->
	<canvas id="matrix"></canvas>

	<h1>诚由上阳的个人主页</h1>
	<h2>已破1500粉丝</h2>

	<!-- 头像 -->
	<img src="img/pyc.png" onclick="hackerAttack()">

	<a href="https://www.codinghou.cn">
		<h1>
			🔥点击传送:进入候网🔥
		</h1>
	</a>

	<script>
		// --- 原有功能：黑客攻击特效 ---
		function hackerAttack() {
			var n = 100;
			for (var i = 1; i <= n; i++) {
				setTimeout(() => {
					let box = document.createElement("div");
					box.innerText = "⚠️ 系统错误 ⚠️"
					document.body.appendChild(box);
					box.className = "fake-alert";

					// 强制重绘以触发 transition
					box.offsetHeight;

					box.style.left = (Math.random() * 100 + "%");
					box.style.top = (Math.random() * 100 + "%");
					box.style.opacity = "1";
					box.style.transform = `scale(${Math.random() + 0.5}) rotate(${Math.random() * 60 - 30}deg)`;

					// 可选：几秒后自动移除元素，防止页面卡顿
					setTimeout(() => {
						box.remove();
					}, 3000);
				}, i * 20);
			}
		}

		// --- 新增功能：黑客帝国代码雨 ---
		const canvas = document.getElementById('matrix');
		const ctx = canvas.getContext('2d');

		// 设置 canvas 尺寸为全屏
		canvas.width = window.innerWidth;
		canvas.height = window.innerHeight;

		// 字符集：可以是二进制、数字或片假名
		const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
		const charArray = chars.split('');

		const fontSize = 16;
		const columns = canvas.width / fontSize; // 列数

		// 每列的当前 y 坐标，初始化为 1
		const drops = [];
		for (let x = 0; x < columns; x++) {
			drops[x] = 1;
		}

		function drawMatrix() {
			// 每一帧用半透明黑色覆盖，形成拖尾效果
			ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
			ctx.fillRect(0, 0, canvas.width, canvas.height);

			ctx.fillStyle = '#0F0'; // 经典的黑客绿
			ctx.font = fontSize + 'px monospace';

			for (let i = 0; i < drops.length; i++) {
				// 随机取一个字符
				const text = charArray[Math.floor(Math.random() * charArray.length)];

				// 绘制字符
				ctx.fillText(text, i * fontSize, drops[i] * fontSize);

				// 如果落到底部或者随机重置，则回到顶部
				if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
					drops[i] = 0;
				}

				// y 坐标增加
				drops[i]++;
			}
		}

		// 启动动画，约 30fps
		setInterval(drawMatrix, 33);

		// 监听窗口大小变化，调整 canvas 尺寸
		window.addEventListener('resize', () => {
			canvas.width = window.innerWidth;
			canvas.height = window.innerHeight;
		});
	</script>
</body>

</html>
